<!DOCTYPE html>
<html>
<head>
    <title>Music Mood AI</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            padding: 30px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .container {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 15px;
            width: 80%;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            justify-items: center;
        }

        label {
            text-align: left;
            width: 85%;
            font-size: 13px;
            color: #ddd;
        }

        input {
            width: 85%;
            padding: 10px;
            border-radius: 12px;
            border: none;
            margin-top: 6px;
            font-size: 14px;
    
            background: rgba(255,255,255,0.9);
            color: #333;

            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
        box-shadow: 0 0 8px #00ffcc;
        transform: scale(1.02);
        }

        button {
            padding: 12px 25px;
            background: #00ffcc;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00ccaa;
        }

        .result {
            margin-top: 25px;
            font-size: 18px;
        }

        .range {
            font-size: 12px;
            color: #ccc;
        }

        .field {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>

<body>

<h1>🎵 Music Mood Classifier</h1>

<div class="container">

<div class="grid">

<div>
<label>Tempo <span class="range">(0–250)</span></label>
<input id="tempo" type="number" step="0.001">
</div>

<div>
<label>Danceability <span class="range">(0–1)</span></label>
<input id="danceability" type="number" step="0.001">
</div>

<div>
<label>Energy <span class="range">(0–1)</span></label>
<input id="energy" type="number" step="0.0001">
</div>

<div>
<label>Key <span class="range">(0–11)</span></label>
<input id="key" type="number">
</div>

<div>
<label>Loudness <span class="range">(-60–0)</span></label>
<input id="loudness" type="number" step="0.0001">
</div>

<div>
<label>Speechiness <span class="range">(0–1)</span></label>
<input id="speechiness" type="number" step="0.0001">
</div>

<div>
<label>Acousticness <span class="range">(0–1)</span></label>
<input id="acousticness" type="number" step="0.001">
</div>

<div>
<label>Instrumentalness <span class="range">(0–1)</span></label>
<input id="instrumentalness" type="number" step="0.00000001">
</div>

<div>
<label>Liveness <span class="range">(0–1)</span></label>
<input id="liveness" type="number" step="0.001">
</div>

<div>
<label>Valence <span class="range">(0–1)</span></label>
<input id="valence" type="number" step="0.001">
</div>

</div>

<button onclick="predictMood()">Predict Mood</button>

<div class="result">
<h2 id="result"></h2>
<p id="reason"></p>
<p id="recommendation"></p>
</div>

<h3>🎶 Suggested Playlist</h3>
<ul id="playlist"></ul>
<h3>📊 Interactive Song Clusters</h3>
<img src="../backend/models/clusters.png" width="400">
<canvas id="clusterChart" width="400" height="300"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
<script src="script.js"></script>

</body>
</html>
